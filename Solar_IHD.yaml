          y: 48
          x: 140
          width: 40
          height: 40
          text_font: battery_icons_40
          text_color: !lambda return lv_color_hex(0x989898); 
          text: "\U000f0599" # sun

      - obj: # flow dot solar
          id: flow_dot_solar
          x: 158
          y: 90
          width: 4
          height: 4
          bg_color: 0xffffff
          border_opa: transp
          border_width: 0
           
      - label: # object for the battery SOC meter
          id: lbl_battery_status
          align: top_left
          y: 120 
          x: 180 
          width: 40
          height: 40
          #border_color: 0xffffff
          #border_width: 1
          transform_angle: 90
          text_font: battery_icons_40
          text_color: !lambda return lv_color_hex(0xa9a9a9);
          text_align: center
          text: "\U000F0091" # start with mdi-battery-unknown
      - label: # gauge numeric indicator
          id: batt_pv_text
          text_font: montserrat_14
          align: top_left
          x: 120
          y: 160
          width: 80
          height: 20
          text_align: center
          text_color: !lambda return lv_color_hex(0xa9a9a9);
          #width: 70
          text: "?%"

      - obj: #obj for the battery flow data
            height: 50
            width: 160
            align: CENTER
            y: 85
            bg_opa: transp
            border_width: 0
            pad_all: 0
            widgets:
            - label:
                id: lbl_battery_flow
                align: top_mid
                text: "idle"
                text_color: !lambda return lv_color_hex(0xa9a9a9);
            - bar:
                id: bar_battery_flow
                align: bottom_mid
                y: -13
                width: 130
                height: 20
                min_value: 0
                max_value: 4000
                start_value: 1000
                value: 2000
                mode: range
                bg_color: !lambda return lv_color_hex(0x989898);
                indicator:
                  bg_color:  !lambda return lv_color_hex(0x989090);
                  height: 4
            - bar:
                id: bar_battery_flow_average
                align: bottom_mid
                y: -18
                width: 130
                height: 10
                min_value: 0
                max_value: 4000
                start_value: 1000
                value: 2000
                mode: range
                bg_opa: 0
                indicator:
                  bg_color:  !lambda return lv_color_hex(0x980000);
                  height: 2

